<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMe — статус сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #6d28d9;
            margin-bottom: 10px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }

        .status {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .online {
            color: #10b981;
        }

        .offline {
            color: #ef4444;
        }

        .checking {
            color: #f59e0b;
        }

        .last-check {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .details {
            text-align: left;
            background: #f1f3f5;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .detail-item {
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge-up {
            background: #10b981;
            color: white;
        }

        .badge-down {
            background: #ef4444;
            color: white;
        }

        .refresh-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: #6d28d9;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 CatMe</h1>
        <p>Статус сервера</p>
        <p>Если не работает используйте VPN</p>

        <div class="status-card">
            <div class="status checking" id="statusText">Проверка...</div>
            <div id="statusIcon" style="font-size: 48px;">⏳</div>
        </div>

        <div class="details">
            <div class="detail-item">
                <strong>🌐 Основной сайт:</strong>
                <a href="https://catme-messenger.ru" target="_blank">catme-messenger.ru</a>
            </div>
            <div class="detail-item">
                <strong>📡 API:</strong>
                <span id="apiStatus">Проверка...</span>
            </div>
            <div class="detail-item">
                <strong>🕒 Последняя проверка:</strong>
                <span id="lastCheck">--:--:--</span>
            </div>
            <div class="detail-item">
                <strong>⏱️ Время ответа:</strong>
                <span id="responseTime">-- ms</span>
            </div>
        </div>

        <button class="refresh-btn" onclick="checkStatus()">🔄 Обновить</button>

        <div class="footer">
            <p>Автоматическое обновление каждые 60 секунд</p>
            <p>CatMe Messenger © 2026</p>
        </div>
    </div>

    <script>
        async function checkStatus() {
            const statusDiv = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const apiStatusSpan = document.getElementById('apiStatus');
            const lastCheckSpan = document.getElementById('lastCheck');
            const responseTimeSpan = document.getElementById('responseTime');
            
            statusDiv.className = 'status checking';
            statusDiv.textContent = 'Проверка...';
            statusIcon.textContent = '⏳';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch('https://catme-messenger.ru/api/users', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const endTime = Date.now();
                const responseTime = endTime - startTime;
                responseTimeSpan.textContent = responseTime + ' ms';
                
                if (response.ok) {
                    statusDiv.className = 'status online';
                    statusDiv.textContent = '🟢 Всё работает';
                    statusIcon.textContent = '✅';
                    apiStatusSpan.innerHTML = '<span class="badge badge-up">Доступно</span>';
                } else {
                    statusDiv.className = 'status offline';
                    statusDiv.textContent = '🔴 API не отвечает';
                    statusIcon.textContent = '❌';
                    apiStatusSpan.innerHTML = '<span class="badge badge-down">Ошибка ' + response.status + '</span>';
                }
            } catch (error) {
                statusDiv.className = 'status offline';
                statusDiv.textContent = '🔴 Сервер недоступен';
                statusIcon.textContent = '❌';
                apiStatusSpan.innerHTML = '<span class="badge badge-down">Недоступен</span>';
                responseTimeSpan.textContent = '-- ms';
            }
            
            const now = new Date();
            lastCheckSpan.textContent = now.toLocaleTimeString();
        }
        
        // Запускаем проверку при загрузке
        checkStatus();
        
        // Автообновление каждые 60 секунд
        setInterval(checkStatus, 60000);
    </script>
</body>
</html>
